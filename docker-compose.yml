version: '3.8'

services:
  # PostgreSQL database for storing agent data, tasks, and results
  postgres:
    image: postgres:16-alpine
    container_name: pentagi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pentagi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pentagi}
      POSTGRES_DB: ${POSTGRES_DB:-pentagi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pentagi} -d ${POSTGRES_DB:-pentagi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pentagi-network

  # Backend API server
  backend:
    build:
      context: ./pkg
      dockerfile: Dockerfile
    container_name: pentagi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-pentagi}:${POSTGRES_PASSWORD:-pentagi}@postgres:5432/${POSTGRES_DB:-pentagi}?sslmode=disable
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./screenshots:/app/screenshots
      - ./reports:/app/reports
    # Limit memory usage to avoid hogging resources on my dev machine
    # Bumped from 512m - was hitting OOM during longer agent runs
    # Bumped again to 1g - 768m still occasionally OOMs on multi-step tasks
    mem_limit: 1g
    # Cap CPU so the backend doesn't starve my other dev containers
    cpus: '1.5'
    networks:
      - pentagi-network

  # Frontend web application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080}
    container_name: pentagi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Using 3001 locally since port 3000 is taken by another project on my machine
      - "${FRONTEND_PORT:-3001}:80"
    # Keep memory footprint small - nginx serving static files doesn't need much
    mem_limit: 256m
    cpus: '0.5'
    networks:
      - pentagi-network

volumes:
  postgres_data:
    driver: local

networks:
  pentagi-network:
    driver: bridge
